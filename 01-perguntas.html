<style>

    background-repeat: no-repeat;
    background-attachment: fixed;
}

/* filtro escuro pra leitura */
body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

}

}

label{

}

input{

}

button{
    margin-top:30px;
    padding:15px 25px;
    border:none;
    background:#ff4d88;
    color:white;
    font-size:18px;
    border-radius:12px;
    cursor:pointer;
}

button:hover{
    background:#ff1a66;
}
</style>

</head>
